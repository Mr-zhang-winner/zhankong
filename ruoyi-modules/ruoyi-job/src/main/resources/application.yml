server:
  port: 9203

spring:
  application:
    name: ruoyi-job
  profiles:
    active: dev

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://127.0.0.1:2881/ry-cloud?useUnicode=true&characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&useSSL=false&serverTimezone=Asia/Shanghai
    username: ruoyi@ruoyi
    password: Ruoyi@123456

    dynamic:
      primary: master
      strict: false
      datasource:
        master:
          driver-class-name: com.mysql.cj.jdbc.Driver
          url: jdbc:mysql://127.0.0.1:2881/ry-cloud?useUnicode=true&characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&useSSL=false&serverTimezone=Asia/Shanghai
          username: ruoyi@ruoyi
          password: Ruoyi@123456
          initial-size: 5
          min-idle: 5
          max-active: 20
          max-wait: 60000
          validation-query: SELECT 1
          test-while-idle: true
          test-on-borrow: false
          test-on-return: false

  quartz:
    job-store-type: jdbc
    jdbc:
      initialize-schema: never

  cloud:
    nacos:
      discovery:
        server-addr: 127.0.0.1:8848
      config:
        server-addr: 127.0.0.1:8848

mybatis:
  type-aliases-package: com.ruoyi.**.domain
  mapper-locations: classpath*:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl