server:
  port: 9400

spring:
  application:
    name: ruoyi-xkd
  profiles:
    active: dev

  datasource:
    dynamic:
      primary: master
      strict: false
      datasource:
        master:
          driver-class-name: com.mysql.cj.jdbc.Driver
          url: jdbc:mysql://127.0.0.1:2881/ry-cloud?useUnicode=true&characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&useSSL=false&serverTimezone=Asia/Shanghai
          username: ruoyi@ruoyi
          password: Ruoyi@123456

  cloud:
    nacos:
      discovery:
        server-addr: 127.0.0.1:8848
      config:
        server-addr: 127.0.0.1:8848

mybatis:
  type-aliases-package: com.ruoyi.xkd.domain
  mapper-locations: classpath*:mapper/xkd/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
